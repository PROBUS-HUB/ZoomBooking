<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZOOM日程予約</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@600;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #14202E;
    --ink-soft: #24344A;
    --paper: #FBFAF6;
    --card: #FFFFFF;
    --line: #E7E3D8;
    --brass: #B3854A;
    --brass-soft: #F3E9D8;
    --teal: #2F8E82;
    --teal-soft: #E5F2EF;
    --muted: #9A9585;
    --text: #1E2430;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--paper);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    color: var(--text);
    -webkit-font-smoothing: antialiased;
  }
  header {
    padding: 40px 24px 30px;
    text-align: center;
  }
  header .eyebrow {
    letter-spacing: 0.28em;
    font-size: 11px;
    color: var(--brass);
    font-weight: 700;
    margin-bottom: 10px;
  }
  header h1 {
    font-family: 'Shippori Mincho', serif;
    font-weight: 800;
    font-size: 26px;
    margin: 0 0 8px;
    color: var(--ink);
  }
  header p {
    color: var(--muted);
    font-size: 13px;
    margin: 0;
  }

  main { max-width: 600px; margin: 0 auto 60px; padding: 0 20px; }

  /* 日付タブ：改札の案内板のようなイメージ */
  .date-rail {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding: 6px 2px 18px;
    scrollbar-width: none;
  }
  .date-rail::-webkit-scrollbar { display: none; }
  .date-tab {
    flex: 0 0 auto;
    width: 66px;
    padding: 12px 0 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--card);
    text-align: center;
    cursor: pointer;
  }
  .date-tab .wd { font-size: 11px; color: var(--muted); font-weight: 700; }
  .date-tab .num { font-family: 'Shippori Mincho', serif; font-size: 22px; font-weight: 800; color: var(--ink); margin: 2px 0; }
  .date-tab .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--teal); margin: 4px auto 0; }
  .date-tab.selected { background: var(--ink); border-color: var(--ink); }
  .date-tab.selected .wd { color: #B9C2D0; }
  .date-tab.selected .num { color: #fff; }
  .date-tab.selected .dot { background: var(--brass); }

  /* 接続線：路線図のようなアクセント */
  .route-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 2px 16px;
    color: var(--brass);
  }
  .route-line .line { flex: 1; height: 1px; background: repeating-linear-gradient(to right, var(--line) 0 6px, transparent 6px 10px); }
  .route-line .label { font-size: 12px; font-weight: 700; white-space: nowrap; color: var(--ink-soft); }

  /* 時刻ボード */
  .board {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 16px;
    padding: 18px;
  }
  .slot-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .slot-btn {
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 13px 10px;
    text-align: center;
    cursor: pointer;
    background: #fff;
  }
  .slot-btn:hover { border-color: var(--teal); background: var(--teal-soft); }
  .slot-btn .t {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    letter-spacing: 0.02em;
  }
  .slot-btn.taken {
    cursor: default;
    background: #F6F5F1;
    opacity: 0.6;
  }
  .slot-btn.taken .t { color: var(--muted); text-decoration: line-through; }
  .slot-btn.taken .tag { color: var(--muted); }
  .slot-btn .tag { font-size: 10px; margin-top: 3px; color: var(--teal); font-weight: 700; letter-spacing: 0.05em; }

  .empty { text-align: center; color: var(--muted); padding: 50px 0; font-size: 13px; }

  .modal-bg {
    display: none;
    position: fixed; inset: 0;
    background: rgba(20,32,46,0.55);
    align-items: center; justify-content: center;
    padding: 20px;
    z-index: 10;
  }
  .modal-bg.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 16px;
    padding: 28px;
    max-width: 400px;
    width: 100%;
  }
  .modal .eyebrow { letter-spacing: 0.2em; font-size: 10px; color: var(--brass); font-weight: 700; margin-bottom: 6px; }
  .modal h2 { font-family: 'Shippori Mincho', serif; font-size: 19px; margin: 0 0 4px; color: var(--ink); }
  .modal .sub { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); margin-bottom: 18px; }
  label { display: block; font-size: 11px; font-weight: 700; color: var(--ink-soft); margin: 12px 0 6px; }
  input {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 9px;
    padding: 11px 12px;
    font-size: 14px;
    font-family: inherit;
    background: var(--paper);
  }
  input:focus { outline: 2px solid var(--brass); outline-offset: 1px; }
  .btn-row { display: flex; gap: 10px; margin-top: 22px; }
  button { border: none; border-radius: 9px; padding: 12px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary { flex: 1.4; background: var(--ink); color: #fff; }
  .btn-primary:disabled { background: var(--muted); cursor: not-allowed; }
  .btn-cancel { flex: 1; background: #EFEDE6; color: var(--text); }
  .note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.6; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; padding: 12px 20px; border-radius: 10px;
    font-size: 13px; display: none; z-index: 20;
  }
  .toast.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="eyebrow">SCHEDULE BOOKING</div>
  <h1>ZOOM日程予約</h1>
  <p>ご都合の良い日時をお選びください</p>
</header>

<main>
  <div class="date-rail" id="dateRail"></div>
  <div class="route-line"><span class="label" id="selectedDateLabel">&nbsp;</span><span class="line"></span></div>
  <div class="board">
    <div class="slot-grid" id="slotGrid"></div>
    <div class="empty" id="emptyState" style="display:none;">現在ご案内できる空き枠がありません</div>
  </div>
</main>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <div class="eyebrow">CONFIRM YOUR SLOT</div>
    <h2>日程を予約する</h2>
    <div class="sub" id="modalSub"></div>
    <label>お名前</label>
    <input type="text" id="inputName" placeholder="山田 太郎">
    <label>会社名</label>
    <input type="text" id="inputCompany" placeholder="株式会社サンプル">
    <label>連絡先（メールまたは電話）</label>
    <input type="text" id="inputContact" placeholder="example@mail.com">
    <div class="btn-row">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-primary" id="submitBtn" onclick="submitReservation()">この日時で予約する</button>
    </div>
    <div class="note">予約後、担当者の確認をもって正式確定となります</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ここに実際のGAS Web AppのURLを設定する
  const API_URL = 'https://script.google.com/macros/s/AKfycbxqPWp6xJ6_xk6ixeCEjyCpBqtzyI9pCErBKhylrCRAgkzMy-gDidURrhSms5SslvOQZg/exec';

  const WD = ['日','月','火','水','木','金','土'];
  let slotsByDate = {};
  let selectedDate = null;
  let selectedSlotId = null;

  function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function fmtDateLong(dateStr) {
    const d = new Date(dateStr + 'T00:00:00');
    return (d.getMonth()+1) + '月' + d.getDate() + '日（' + WD[d.getDay()] + '）';
  }

  async function loadSlots() {
    const res = await fetch(API_URL + '?action=getPublicSlots');
    const data = await res.json();
    if (!data.ok) return;

    slotsByDate = {};
    data.slots.sort((a,b) => (a.date+a.startTime).localeCompare(b.date+b.startTime));
    data.slots.forEach(s => {
      if (!slotsByDate[s.date]) slotsByDate[s.date] = [];
      slotsByDate[s.date].push(s);
    });

    renderDateRail();
  }

  function renderDateRail() {
    const rail = document.getElementById('dateRail');
    rail.innerHTML = '';
    const dates = Object.keys(slotsByDate).sort();

    if (!dates.length) {
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('slotGrid').innerHTML = '';
      document.getElementById('selectedDateLabel').textContent = '';
      return;
    }

    if (!selectedDate || !dates.includes(selectedDate)) selectedDate = dates[0];

    dates.forEach(date => {
      const d = new Date(date + 'T00:00:00');
      const hasOpen = slotsByDate[date].some(s => s.status === '空き');
      const tab = document.createElement('div');
      tab.className = 'date-tab' + (date === selectedDate ? ' selected' : '');
      tab.innerHTML =
        '<div class="wd">' + WD[d.getDay()] + '</div>' +
        '<div class="num">' + d.getDate() + '</div>' +
        (hasOpen ? '<div class="dot"></div>' : '');
      tab.onclick = () => { selectedDate = date; renderDateRail(); };
      rail.appendChild(tab);
    });

    document.getElementById('selectedDateLabel').textContent = fmtDateLong(selectedDate);
    renderSlotGrid();
  }

  function renderSlotGrid() {
    const grid = document.getElementById('slotGrid');
    const empty = document.getElementById('emptyState');
    grid.innerHTML = '';
    const slots = slotsByDate[selectedDate] || [];

    if (!slots.length) { empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    slots.forEach(s => {
      const isOpen = s.status === '空き';
      const btn = document.createElement('div');
      btn.className = 'slot-btn' + (isOpen ? '' : ' taken');
      btn.innerHTML =
        '<div class="t">' + s.startTime + ' - ' + s.endTime + '</div>' +
        '<div class="tag">' + (isOpen ? '予約可能' : '予約済み') + '</div>';
      if (isOpen) btn.onclick = () => openModal(s);
      grid.appendChild(btn);
    });
  }

  function openModal(s) {
    selectedSlotId = s.id;
    document.getElementById('modalSub').textContent = fmtDateLong(s.date) + '  ' + s.startTime + ' - ' + s.endTime;
    document.getElementById('inputName').value = '';
    document.getElementById('inputCompany').value = '';
    document.getElementById('inputContact').value = '';
    document.getElementById('modalBg').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modalBg').classList.remove('show');
  }

  async function submitReservation() {
    const name = document.getElementById('inputName').value.trim();
    const company = document.getElementById('inputCompany').value.trim();
    const contact = document.getElementById('inputContact').value.trim();
    if (!name || !contact) { toast('お名前と連絡先を入力してください'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'reserveSlot',
          id: selectedSlotId,
          clientName: name,
          clientCompany: company,
          clientContact: contact
        })
      });
      const data = await res.json();
      if (data.ok) {
        closeModal();
        toast('仮予約を受け付けました。担当者の確認後に確定します');
        loadSlots();
      } else if (data.error === 'already_taken') {
        toast('この枠はすでに予約されています。別の枠をお選びください');
        closeModal();
        loadSlots();
      } else {
        toast('エラーが発生しました。時間をおいて再度お試しください');
      }
    } catch (e) {
      toast('通信エラーが発生しました');
    } finally {
      btn.disabled = false;
      btn.textContent = 'この日時で予約する';
    }
  }

  loadSlots();
</script>
</body>
</html>
